<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>졸음 감지 대시보드</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-strong: #19202a;
      --text: #17202a;
      --muted: #687385;
      --line: #dfe5ec;
      --ok: #16865b;
      --warn: #b77908;
      --danger: #c9332b;
      --shadow: 0 12px 32px rgba(18, 28, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Pretendard", "Apple SD Gothic Neo", sans-serif;
      letter-spacing: 0;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.25;
      font-weight: 750;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .connection {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #9aa4b2;
    }

    .connection.online .dot { background: var(--ok); }
    .connection.offline .dot { background: var(--danger); }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(0, 1.45fr);
      gap: 18px;
      align-items: start;
    }

    .status-panel {
      min-height: 320px;
      padding: 24px;
      border-radius: 8px;
      background: var(--panel-strong);
      color: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .status-panel::after {
      content: "";
      position: absolute;
      inset: auto -20% -42% -20%;
      height: 180px;
      background: rgba(255, 255, 255, 0.08);
      transform: rotate(-4deg);
    }

    .status-label {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.86rem;
      font-weight: 650;
    }

    .stage-name {
      margin: 12px 0 8px;
      font-size: 3.2rem;
      line-height: 1;
      font-weight: 800;
    }

    .stage-desc {
      min-height: 48px;
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 1rem;
      line-height: 1.55;
    }

    .stage-strip {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 42px;
    }

    .stage-chip {
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 9px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.8rem;
      text-align: center;
    }

    .stage-chip.active {
      background: #fff;
      color: var(--text);
      font-weight: 750;
    }

    .main-grid {
      display: grid;
      gap: 18px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .metric, .camera, .logs {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 128px;
      padding: 18px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 650;
    }

    .metric .value {
      margin-top: 12px;
      font-size: 1.9rem;
      font-weight: 780;
      line-height: 1;
    }

    .metric .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .bar {
      height: 7px;
      margin-top: 16px;
      border-radius: 999px;
      background: #e9edf2;
      overflow: hidden;
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #4f6f91;
      transition: width 0.25s ease;
    }

    .camera {
      overflow: hidden;
    }

    .camera-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 17px 18px;
      border-bottom: 1px solid var(--line);
    }

    .camera-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .camera-head span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .camera-frame {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #edf1f5;
    }

    .logs {
      overflow: hidden;
    }

    .logs-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 17px 18px;
      border-bottom: 1px solid var(--line);
    }

    .logs-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .logs-head span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      background: #f8fafc;
    }

    tr:last-child td { border-bottom: 0; }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 750;
    }

    .stage-badge.ok { color: var(--ok); background: #e5f4ee; }
    .stage-badge.warn { color: var(--warn); background: #fff4d9; }
    .stage-badge.danger { color: var(--danger); background: #fde8e6; }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    body.stage-ok .status-panel { background: #17392f; }
    body.stage-warn .status-panel { background: #4a3510; }
    body.stage-danger .status-panel { background: #4d1f1c; }
    body.stage-ok #ear-bar span { background: var(--ok); }
    body.stage-warn #ear-bar span { background: var(--warn); }
    body.stage-danger #ear-bar span { background: var(--danger); }

    @media (max-width: 860px) {
      .dashboard { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .connection { width: 100%; justify-content: center; }
      .stage-name { font-size: 2.65rem; }
    }
  </style>
</head>
<body class="stage-ok">
  <main class="shell">
    <header class="topbar">
      <div class="title">
        <h1>실시간 운전자 졸음 감지</h1>
        <p>EAR, 머리 각도, 단계 전이를 실시간으로 모니터링합니다.</p>
      </div>
      <div id="connection" class="connection offline">
        <span class="dot"></span>
        <span id="connection-text">연결 확인 중</span>
      </div>
    </header>

    <section class="dashboard">
      <aside class="status-panel">
        <div class="status-label">현재 단계</div>
        <div id="stage" class="stage-name">--</div>
        <p id="stage-desc" class="stage-desc">상태 데이터를 기다리는 중입니다.</p>

        <div class="stage-strip" aria-label="졸음 단계">
          <div id="chip-ok" class="stage-chip">정상<br>OK</div>
          <div id="chip-warn" class="stage-chip">주의<br>WARN</div>
          <div id="chip-danger" class="stage-chip">위험<br>DANGER</div>
        </div>
      </aside>

      <div class="main-grid">
        <section class="metric-grid">
          <article class="metric">
            <div class="label">눈 감김 지표 EAR</div>
            <div id="ear" class="value">-</div>
            <div class="hint">값이 낮을수록 눈 감김 가능성이 큽니다.</div>
            <div id="ear-bar" class="bar"><span></span></div>
          </article>

          <article class="metric">
            <div class="label">머리 숙임 각도</div>
            <div id="pitch" class="value">-</div>
            <div class="hint">임계값 이상이면 졸음 신호로 반영됩니다.</div>
            <div id="pitch-bar" class="bar"><span></span></div>
          </article>

          <article class="metric">
            <div class="label">마지막 업데이트</div>
            <div id="updated" class="value">-</div>
            <div class="hint">대시보드가 받은 최신 상태 시간입니다.</div>
          </article>
        </section>

        <section class="camera">
          <div class="camera-head">
            <h2>카메라 화면</h2>
            <span>MJPEG 스트림</span>
          </div>
          <img class="camera-frame" src="/video" alt="실시간 카메라 화면">
        </section>

        <section class="logs">
          <div class="logs-head">
            <h2>이벤트 로그</h2>
            <span id="log-count">최근 0건</span>
          </div>
          <table>
            <thead>
              <tr><th>시간</th><th>단계</th><th>EAR</th><th>Pitch</th><th>클립</th></tr>
            </thead>
            <tbody id="log-rows">
              <tr><td class="empty" colspan="5">로그 없음</td></tr>
            </tbody>
          </table>
        </section>
      </div>
    </section>
  </main>

  <script>
    const stageMeta = {
      ok: { label: "정상", desc: "운전자의 눈과 머리 자세가 안정 범위에 있습니다." },
      warn: { label: "주의", desc: "졸음 의심 신호가 이어지고 있습니다. 운전자 상태를 확인하세요." },
      danger: { label: "위험", desc: "강한 졸음 신호가 감지되었습니다. 즉시 경고가 필요합니다." }
    };

    function fmt(value, digits) {
      return typeof value === "number" ? value.toFixed(digits) : "-";
    }

    function setConnection(online) {
      const box = document.getElementById("connection");
      box.className = "connection " + (online ? "online" : "offline");
      document.getElementById("connection-text").textContent = online ? "대시보드 연결됨" : "서버 응답 없음";
    }

    function updateBars(ear, pitch) {
      const earWidth = typeof ear === "number" ? Math.max(0, Math.min(100, (ear / 0.45) * 100)) : 0;
      const pitchWidth = typeof pitch === "number" ? Math.max(0, Math.min(100, (Math.abs(pitch) / 35) * 100)) : 0;
      document.querySelector("#ear-bar span").style.width = earWidth + "%";
      document.querySelector("#pitch-bar span").style.width = pitchWidth + "%";
    }

    async function poll() {
      try {
        const r = await fetch("/status");
        const s = await r.json();
        const stage = s.stage || "ok";
        const meta = stageMeta[stage] || { label: stage.toUpperCase(), desc: "상태 데이터를 수신했습니다." };

        document.body.className = "stage-" + stage;
        document.getElementById("stage").textContent = meta.label;
        document.getElementById("stage-desc").textContent = meta.desc;
        document.getElementById("ear").textContent = fmt(s.ear, 3);
        document.getElementById("pitch").textContent = typeof s.pitch === "number" ? fmt(s.pitch, 1) + "°" : "-";
        document.getElementById("updated").textContent = s.ts ? new Date(s.ts * 1000).toLocaleTimeString("ko-KR") : "-";

        ["ok", "warn", "danger"].forEach(function (name) {
          document.getElementById("chip-" + name).classList.toggle("active", name === stage);
        });
        updateBars(s.ear, s.pitch);
        setConnection(true);
      } catch (e) {
        setConnection(false);
      }
    }

    async function pollLogs() {
      try {
        const r = await fetch("/logs");
        const rows = await r.json();
        const tbody = document.getElementById("log-rows");
        document.getElementById("log-count").textContent = "최근 " + Math.min(rows.length, 20) + "건";
        if (!rows.length) {
          tbody.innerHTML = '<tr><td class="empty" colspan="5">로그 없음</td></tr>';
          return;
        }
        tbody.innerHTML = rows.slice(-20).reverse().map(function (e) {
          const stage = e.stage || "-";
          const clip = e.clip ? e.clip : "-";
          return '<tr><td>' + (e.time ?? "-") + '</td>' +
                 '<td><span class="stage-badge ' + stage + '">' + stage + '</span></td>' +
                 '<td>' + (typeof e.ear === "number" ? e.ear.toFixed(3) : "-") + '</td>' +
                 '<td>' + (typeof e.pitch === "number" ? e.pitch.toFixed(1) + "°" : "-") + '</td>' +
                 '<td>' + clip + '</td></tr>';
        }).join("");
      } catch (e) {
        // 로그 갱신 실패는 상태 폴링에서 연결 상태를 표시한다.
      }
    }

    setInterval(poll, 500);
    setInterval(pollLogs, 2000);
    poll();
    pollLogs();
  </script>
</body>
</html>
